name: Fix Project Structure
on: [workflow_dispatch]
jobs:
  fix-folders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fix Structure
        run: |
          # تصليح اسم الفولدر
          mv "src." src || true
          
          # إنشاء الفولدرات الناقصة
          mkdir -p src/hooks src/workers
          
          # نقل الملفات لمكانها الصح لو موجودة بره
          mv useVectorizer.ts src/hooks/ 2>/dev/null || true
          mv vectorizer.worker.ts src/workers/ 2>/dev/null || true
          
          # إعداد البوت ورفع التعديلات
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: fix folder structure automatically" || true
          git push
