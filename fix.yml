name: Fix Project Structure

on:
  workflow_dispatch

jobs:
  fix-structure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix folder structure
        run: |
          # 1. Rename src. to src
          if [ -d "src." ]; then
            mv "src." src || true
            echo "✓ Renamed src. to src"
          fi
          
          # 2. Create missing folders
          mkdir -p src/hooks src/workers
          echo "✓ Created src/hooks and src/workers directories"
          
          # 3. Find and move useVectorizer.ts to src/hooks/
          if find . -name "useVectorizer.ts" -type f | grep -v node_modules; then
            find . -name "useVectorizer.ts" -type f ! -path "*/node_modules/*" -exec mv {} src/hooks/ \; 
            echo "✓ Moved useVectorizer.ts to src/hooks/"
          fi
          
          # 4. Find and move vectorizer.worker.ts to src/workers/
          if find . -name "vectorizer.worker.ts" -type f | grep -v node_modules; then
            find . -name "vectorizer.worker.ts" -type f ! -path "*/node_modules/*" -exec mv {} src/workers/ \; 
            echo "✓ Moved vectorizer.worker.ts to src/workers/"
          fi
          
          # 5. Move index.html to root if it's in src
          if [ -f "src/index.html" ]; then
            mv src/index.html ./index.html
            echo "✓ Moved index.html to root directory"
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "ℹ No changes to commit"
          else
            git commit -m "chore: fix folder structure and organize files"
            git push origin main
            echo "✓ Changes pushed to main branch"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
